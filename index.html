<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Książka Adresowa - Projekt jQuery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="text-center mb-4">📇 Książka Adresowa</h1>

    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-primary text-white">Dodaj nowy kontakt</div>
        <div class="card-body">
            <form id="contactForm">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label>Imię i Nazwisko</label>
                        <input type="text" name="fullname" class="form-control" placeholder="Jan Kowalski">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" placeholder="jan@przyklad.pl">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>Telefon</label>
                        <input type="text" name="phone" class="form-control" placeholder="123456789">
                    </div>
                </div>
                <button type="submit" class="btn btn-success" id="addBtn">Dodaj Kontakt</button>
            </form>
        </div>
    </div>

    <div class="card shadow-sm p-3">
        <table id="contactTable" class="display" style="width:100%">
            <thead>
                <tr>
                    <th>Imię i Nazwisko</th>
                    <th>Email</th>
                    <th>Telefon</th>
                    <th>Akcja</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="script.js"></script>
</body>
</html>
